<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link rel="stylesheet" href="src/css/base.css">
  <link rel="stylesheet" href="src/css/login.css">
  <script type="module" src="src/js/pages/login.js"> </script>
</head>



<body>


  <div class="page-wrapper">
    <form class="login-form" id="login-form">
      <div class="left-panel">
        <h1>Welcome Back!</h1>
        <h3> Sign in right now to have a synchronize schedule with every device! </h3>
      </div>
      <div class="right-panel">
        <div class="email-box">
          <h3> Email </h3>
          <div class="input-container">
            <input class="input-box" name="email" type="text" placeholder="Email" required> 
          </div>
        </div>
        
        <div class="password-box">
          <h3> Password </h2>
          <div class="input-container">
            <input class="input-box" name="password" type="password" placeholder="Password" required> 
            <a href="#"> Forgot your password? </a>
          </div>
        </div>

        <div class="button-container">
          <button type="submit" class="btn">LOG IN</button>
          <div class="register-link">
            Don't have an account? Email not in used? <a href="/register"> Register now! </a>
          </div>
          <a class="grey-link" href="#"> Use as a guest account</a>
        </div>
      </div>
    </form>

  </div>
  </div>  
</body>
</html>
